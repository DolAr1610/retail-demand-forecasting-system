<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Demand Forecast MVP • Predict</title>
  <meta name="description" content="Demand forecasting form with real backend prediction." />
  <link rel="stylesheet" href="/ui/assets/styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="/ui/">
        <span class="brand-dot"></span>
        <span>Demand Forecast MVP</span>
        <span class="badge">Forecast</span>
      </a>

      <nav class="nav">
        <a class="nav-link" href="/ui/">Home</a>
        <a class="nav-link" href="/ui/predict">Predict</a>
        <a class="nav-link" href="/ui/analytics">Analytics</a>
        <a class="nav-link" href="/ui/about">About</a>
        <a class="nav-link" href="/ui/agent">Agent</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-head">
      <div>
        <h1>Predict</h1>
      </div>
    </section>

    <section class="grid">
      <div class="card col-6">
        <div class="card-head">
          <h2>Inputs</h2>
          <span class="pill">Live</span>
        </div>

        <form id="predictForm" class="form">
          <label class="field">
            <span>Date</span>
            <input id="inpDate" type="date" />
            <small class="muted">Allowed window: <span id="dateHint"></span></small>
          </label>

          <div class="row">
            <label class="field">
              <span>Store</span>
              <select id="inpStore"></select>
            </label>

            <label class="field">
              <span>Item</span>
              <input
                id="inpItem"
                type="text"
                placeholder="Enter Item 1 or item_nbr"
                autocomplete="off"
              />
              <small class="muted" id="itemHint">
                You can enter Item 1 or a numeric item_nbr.
              </small>
            </label>
          </div>

          <label class="field">
            <span>Model</span>
            <select id="inpModel"></select>
          </label>

          <button class="btn" type="submit">Get forecast</button>
        </form>
      </div>

      <div class="card col-6">
        <div class="card-head">
          <h2>Prediction result</h2>
        </div>


        <div id="outCard" class="result hidden">
          <div class="facts">
            <div class="fact">
              <div class="fact-k">Model</div>
              <div class="fact-v" id="outModel">—</div>
            </div>

            <div class="fact">
              <div class="fact-k">Date</div>
              <div class="fact-v" id="outTargetDate">—</div>
            </div>

            <div class="fact">
              <div class="fact-k">Item</div>
              <div class="fact-v" id="outItemLabel">—</div>
            </div>

            <div class="fact">
              <div class="fact-k">Predicted sales</div>
              <div class="fact-v" id="outPred">—</div>
            </div>

            <div class="fact">
              <div class="fact-k">Actual</div>
              <div class="fact-v" id="outActual">—</div>
            </div>

            <div class="fact">
              <div class="fact-k">Abs error</div>
              <div class="fact-v" id="outAbsError">—</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner single-center">
      <span>Demand Forecast MVP • Predict</span>
    </div>
  </footer>

  <script type="module" src="/ui/assets/app.js"></script>
  <script type="module" src="/ui/assets/predict.js"></script>
</body>
</html>
